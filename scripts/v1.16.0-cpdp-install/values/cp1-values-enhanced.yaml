# Router Operator Configuration (Main Ingress for CP)
router-operator:
  # Session Keys (REQUIRED - must be created before installation)
  # Create with: kubectl create secret generic session-keys -n <namespace> \
  #   --from-literal=TSC_SESSION_KEY=$(openssl rand -base64 48 | tr -dc 'A-Za-z0-9' | head -c32) \
  #   --from-literal=DOMAIN_SESSION_KEY=$(openssl rand -base64 48 | tr -dc 'A-Za-z0-9' | head -c32)
  # tscSessionKey:
  #   secretName: "session-keys"
  #   key: "TSC_SESSION_KEY"
  # domainSessionKey:
  #   secretName: "session-keys"
  #   key: "DOMAIN_SESSION_KEY"
  
  # Resource Configuration
  # resources:
  #   requests:
  #     cpu: 200m
  #     memory: 256Mi
  #   limits:
  #     cpu: 500m
  #     memory: 1024Mi
  
  # Traditional Ingress Configuration
  ingress:
    enabled: true
    ingressClassName: "traefik"
    # annotations:
    #   cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      # Subscription endpoint with hostPrefix: ai
      - host: "ai.dp1.atsnl-emea.azure.dataplanes.pro"
        paths:
          - path: /
            pathType: Prefix
            port: 100
      # Admin console endpoint
      - host: "admin.dp1.atsnl-emea.azure.dataplanes.pro"
        paths:
          - path: /
            pathType: Prefix
            port: 100
    # tls:
    #   - secretName: cp-router-tls
    #     hosts:
    #       - "admin.dp1.atsnl-emea.azure.dataplanes.pro"
    #       - "ai.dp1.atsnl-emea.azure.dataplanes.pro"
  
  # Gateway API Configuration (alternative to traditional Ingress)
  # Requires Gateway API CRDs: kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.0.0/standard-install.yaml
  # gatewayRoute:
  #   enabled: false
  #   parentRefs:
  #     - name: gateway
  #       namespace: cp1-ns
  #   hostnames:
  #     - "*.cp1-my.localhost.dataplanes.pro"
  #   annotations:
  #     external-dns.alpha.kubernetes.io/hostname: "*.cp1-my.localhost.dataplanes.pro"

# Hybrid Proxy Configuration (Cloud-Edge - v1.16.0)
hybrid-proxy:
  # resources:
  #   requests:
  #     cpu: 200m
  #     memory: 256Mi
  #   limits:
  #     cpu: 500m
  #     memory: 1024Mi
  
  ingress:
    enabled: true
    ingressClassName: "traefik"
    # annotations:
    #   cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: "ai.dp1.atsnl-emea.azure.dataplanes.pro"
    # tls:
    #   - secretName: hybrid-proxy-tls
    #     hosts:
    #       - "ai.dp1.atsnl-emea.azure.dataplanes.pro"
  
  # Gateway API Configuration (alternative)
