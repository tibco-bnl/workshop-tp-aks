# PostgreSQL Bitnami Helm Chart Values
# For TIBCO Platform Control Plane v1.15.0
# Namespace: tibco-ext

global:
  security:
    allowInsecureImages: true

image:
  registry: csgprdeuwrepoedge.jfrog.io
  repository: tibco-platform-docker-prod/common-postgresql
  tag: "16.4.0-debian-12-r14"
  pullSecrets:
    - tibco-container-registry-credentials

auth:
  postgresPassword: "postgres"
  username: "postgres"
  password: "postgres"
  database: "postgres"

primary:
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
  
  persistence:
    enabled: true
    size: "50Gi"
    storageClass: "managed-csi-premium"  # Azure Disk for PostgreSQL
    accessModes:
      - ReadWriteOnce
