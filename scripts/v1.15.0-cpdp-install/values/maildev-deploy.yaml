apiVersion: apps/v1
kind: Deployment
metadata:
  name: maildev
  namespace: tibco-ext
  labels:
    app: development-mailserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: development-mailserver
  template:
    metadata:
      labels:
        app: development-mailserver
    spec:
      containers:
        - name: maildev
          image: maildev/maildev:latest
          args: ["-s", "1025", "-w", "1080"]
          ports:
            - name: http
              containerPort: 1080
              protocol: TCP
            - name: smtp
              containerPort: 1025
              protocol: TCP
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"

---
apiVersion: v1
kind: Service
metadata:
  name: development-mailserver
  namespace: tibco-ext
spec:
  selector:
    app: development-mailserver
  ports:
    - protocol: TCP
      port: 1080
      targetPort: 1080
      name: http
    - protocol: TCP
      port: 1025
      targetPort: 1025
      name: smtp
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: maildev-ingress
  namespace: tibco-ext
  labels:
    app: development-mailserver
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: mail.dp1.atsnl-emea.azure.dataplanes.pro
spec:
  ingressClassName: traefik
  rules:
    - host: mail.dp1.atsnl-emea.azure.dataplanes.pro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: development-mailserver
                port:
                  number: 1080
  tls:
    - secretName: maildev-tls
      hosts:
        - mail.dp1.atsnl-emea.azure.dataplanes.pro
